<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – SASTRA E-Canteen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page admin-auth">
<div class="auth-container">
  <div class="auth-left admin-left">
    <a href="/" class="back-link">← Back to Home</a>
    <div class="auth-brand">🍽 SASTRA E-Canteen</div>
    <h1>Admin<br><span class="accent">Control Panel</span></h1>
    <p>Manage orders, inventory, and revenue from the admin dashboard.</p>
    <div class="auth-visual">⚙️</div>
    <div class="admin-hint">
      <small>Demo: admin@sastra.ac.in / admin123</small>
    </div>
  </div>
  <div class="auth-right">
    <h2 style="margin-bottom:2rem">Admin Login</h2>
    <div class="form-group">
      <label>Admin Name</label>
      <input type="text" id="adminName" placeholder="Admin Name" required>
    </div>
    <div class="form-group">
      <label>Admin Email</label>
      <input type="email" id="adminEmail" placeholder="admin@sastra.ac.in" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="adminPass" placeholder="Password" required>
    </div>
    <div id="adminMsg" class="msg"></div>
    <button class="submit-btn" onclick="doAdminLogin()">Login as Admin →</button>
  </div>
</div>
<script>
async function doAdminLogin() {
  const name = document.getElementById('adminName').value;
  const email = document.getElementById('adminEmail').value;
  const password = document.getElementById('adminPass').value;
  const msg = document.getElementById('adminMsg');
  if (!name || !email || !password) { msg.textContent = 'Fill all fields'; msg.className='msg error'; return; }
  const res = await fetch('/admin/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name, email, password})
  });
  const data = await res.json();
  if (data.success) { window.location.href = '/admin/dashboard'; }
  else { msg.textContent = data.message; msg.className='msg error'; }
}
</script>

<script>
function getTheme(){return localStorage.getItem('ecanteen-theme')||'dark';}
function applyTheme(t){document.body.classList.toggle('light-mode',t==='light');localStorage.setItem('ecanteen-theme',t);}
applyTheme(getTheme());
</script>
</body>
</html>
