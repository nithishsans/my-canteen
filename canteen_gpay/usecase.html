<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Use Case Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #f0f4ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }
  h1 {
    font-size: 1.6rem;
    color: #1a1a2e;
    margin-bottom: 6px;
    font-weight: 700;
    text-align: center;
  }
  .subtitle {
    font-size: 0.9rem;
    color: #666;
    margin-bottom: 28px;
    text-align: center;
  }
  .diagram-wrapper {
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    padding: 24px;
    overflow-x: auto;
    max-width: 100%;
  }
  svg {
    display: block;
  }

  /* Actor */
  .actor-label {
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    fill: #1a1a2e;
    text-anchor: middle;
  }
  .actor-shape { fill: none; stroke: #1a1a2e; stroke-width: 2; }

  /* System boundary */
  .boundary {
    fill: #f8faff;
    stroke: #3b5bdb;
    stroke-width: 2.5;
    stroke-dasharray: 8,4;
    rx: 16; ry: 16;
  }
  .boundary-label {
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    fill: #3b5bdb;
    text-anchor: middle;
  }

  /* Use case ellipses */
  .usecase {
    fill: #e8f0fe;
    stroke: #3b5bdb;
    stroke-width: 2;
    transition: all 0.2s;
    cursor: pointer;
  }
  .usecase:hover { fill: #c5d8fb; }
  .usecase-label {
    font-size: 11.5px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    fill: #1e3a8a;
    text-anchor: middle;
    pointer-events: none;
  }

  /* Connections */
  .assoc { stroke: #555; stroke-width: 1.8; fill: none; }
  .arrow { stroke: #3b5bdb; stroke-width: 1.6; fill: none; stroke-dasharray: 5,3; }
  .arrowhead { fill: #3b5bdb; }

  /* Legend */
  .legend {
    display: flex;
    gap: 24px;
    margin-top: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.82rem; color: #444;
  }
  .leg-line { width: 30px; height: 2px; }
  .leg-solid { background: #555; }
  .leg-dashed { background: #3b5bdb; border-top: 2px dashed #3b5bdb; height: 0; }
  .leg-ellipse {
    width: 28px; height: 16px; border-radius: 50%;
    background: #e8f0fe; border: 2px solid #3b5bdb;
    display: inline-block;
  }
  .leg-stick { font-size: 1.2rem; }
</style>
</head>
<body>

<h1>\ud83d\udccc Use Case Diagram</h1>
<p class="subtitle">SASTRA E-Canteen System \u2014 Student & Admin Interactions</p>

<div class="diagram-wrapper">
<svg width="900" height="680" viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg">

  <!-- \u2500\u2500\u2500 SYSTEM BOUNDARY \u2500\u2500\u2500 -->
  <rect x="180" y="60" width="560" height="570" rx="16" ry="16"
        fill="#f8faff" stroke="#3b5bdb" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="460" y="92" class="boundary-label">SASTRA E-Canteen System</text>

  <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       ACTORS
  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->

  <!-- Student Actor (left) -->
  <!-- Head -->
  <circle cx="70" cy="230" r="22" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Body -->
  <line x1="70" y1="252" x2="70" y2="310" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Arms -->
  <line x1="40" y1="275" x2="100" y2="275" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Legs -->
  <line x1="70" y1="310" x2="48" y2="345" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="70" y1="310" x2="92" y2="345" stroke="#1a1a2e" stroke-width="2"/>
  <text x="70" y="368" class="actor-label">Student</text>

  <!-- Admin Actor (right) -->
  <circle cx="830" cy="300" r="22" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="830" y1="322" x2="830" y2="380" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="800" y1="345" x2="860" y2="345" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="830" y1="380" x2="808" y2="415" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="830" y1="380" x2="852" y2="415" stroke="#1a1a2e" stroke-width="2"/>
  <text x="830" y="438" class="actor-label">Admin</text>

  <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       USE CASES \u2014 Student Side
  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->

  <!-- UC1: Register / Login -->
  <ellipse cx="330" cy="150" rx="110" ry="32" class="usecase"/>
  <text x="330" y="146" class="usecase-label">Register /</text>
  <text x="330" y="161" class="usecase-label">Login</text>

  <!-- UC2: Browse Menu -->
  <ellipse cx="330" cy="240" rx="110" ry="32" class="usecase"/>
  <text x="330" y="244" class="usecase-label">Browse Menu</text>

  <!-- UC3: Filter by Category -->
  <ellipse cx="330" cy="325" rx="110" ry="32" class="usecase"/>
  <text x="330" y="321" class="usecase-label">Filter by</text>
  <text x="330" y="336" class="usecase-label">Category</text>

  <!-- UC4: Add to Cart -->
  <ellipse cx="330" cy="415" rx="110" ry="32" class="usecase"/>
  <text x="330" y="419" class="usecase-label">Add to Cart</text>

  <!-- UC5: Place Order -->
  <ellipse cx="330" cy="505" rx="110" ry="32" class="usecase"/>
  <text x="330" y="509" class="usecase-label">Place Order</text>

  <!-- UC6: Make Payment (UPI) -->
  <ellipse cx="460" cy="580" rx="115" ry="32" class="usecase"/>
  <text x="460" y="576" class="usecase-label">Make Payment</text>
  <text x="460" y="591" class="usecase-label">(UPI / GPay)</text>

  <!-- UC7: View Order Confirmation -->
  <ellipse cx="590" cy="505" rx="115" ry="32" class="usecase"/>
  <text x="590" y="501" class="usecase-label">View Order</text>
  <text x="590" y="516" class="usecase-label">Confirmation</text>

  <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       USE CASES \u2014 Admin Side
  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->

  <!-- UC8: Admin Login -->
  <ellipse cx="590" cy="150" rx="110" ry="32" class="usecase"/>
  <text x="590" y="154" class="usecase-label">Admin Login</text>

  <!-- UC9: View Dashboard -->
  <ellipse cx="590" cy="240" rx="110" ry="32" class="usecase"/>
  <text x="590" y="244" class="usecase-label">View Dashboard</text>

  <!-- UC10: Manage Menu / Inventory -->
  <ellipse cx="590" cy="325" rx="110" ry="32" class="usecase"/>
  <text x="590" y="321" class="usecase-label">Manage Menu /</text>
  <text x="590" y="336" class="usecase-label">Inventory</text>

  <!-- UC11: Manage Orders -->
  <ellipse cx="590" cy="415" rx="110" ry="32" class="usecase"/>
  <text x="590" y="419" class="usecase-label">Manage Orders</text>

  <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       ASSOCIATIONS \u2014 Student
  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->

  <!-- Student \u2192 Register/Login -->
  <line x1="92" y1="222" x2="218" y2="160" class="assoc"/>
  <!-- Student \u2192 Browse Menu -->
  <line x1="92" y1="240" x2="218" y2="240" class="assoc"/>
  <!-- Student \u2192 Filter -->
  <line x1="92" y1="255" x2="218" y2="320" class="assoc"/>
  <!-- Student \u2192 Add to Cart -->
  <line x1="92" y1="265" x2="218" y2="408" class="assoc"/>
  <!-- Student \u2192 Place Order -->
  <line x1="92" y1="270" x2="218" y2="498" class="assoc"/>

  <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       ASSOCIATIONS \u2014 Admin
  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->
  <!-- Admin \u2192 Admin Login -->
  <line x1="808" y1="292" x2="702" y2="162" class="assoc"/>
  <!-- Admin \u2192 View Dashboard -->
  <line x1="808" y1="300" x2="702" y2="246" class="assoc"/>
  <!-- Admin \u2192 Manage Menu -->
  <line x1="808" y1="308" x2="702" y2="328" class="assoc"/>
  <!-- Admin \u2192 Manage Orders -->
  <line x1="808" y1="320" x2="702" y2="415" class="assoc"/>

  <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       INCLUDE / EXTEND ARROWS
  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->

  <!-- Browse Menu <<include>> Filter -->
  <line x1="330" y1="272" x2="330" y2="293" class="arrow"/>
  <polygon points="330,293 324,281 336,281" class="arrowhead"/>
  <text x="345" y="286" font-size="10" fill="#3b5bdb" font-style="italic">\u00abinclude\u00bb</text>

  <!-- Add to Cart <<include>> Place Order -->
  <line x1="330" y1="447" x2="330" y2="473" class="arrow"/>
  <polygon points="330,473 324,461 336,461" class="arrowhead"/>
  <text x="345" y="463" font-size="10" fill="#3b5bdb" font-style="italic">\u00abinclude\u00bb</text>

  <!-- Place Order <<include>> Make Payment -->
  <line x1="370" y1="530" x2="420" y2="558" class="arrow"/>
  <polygon points="420,558 406,552 412,564" class="arrowhead"/>
  <text x="370" y="550" font-size="10" fill="#3b5bdb" font-style="italic">\u00abinclude\u00bb</text>

  <!-- Make Payment <<include>> View Confirmation -->
  <line x1="535" y1="565" x2="560" y2="540" class="arrow"/>
  <polygon points="560,540 548,546 554,534" class="arrowhead"/>
  <text x="545" y="558" font-size="10" fill="#3b5bdb" font-style="italic">\u00abinclude\u00bb</text>

  <!-- Manage Orders <<extend>> View Dashboard -->
  <line x1="590" y1="383" x2="590" y2="272" class="arrow"/>
  <polygon points="590,272 584,284 596,284" class="arrowhead"/>
  <text x="600" y="330" font-size="10" fill="#3b5bdb" font-style="italic">\u00abextend\u00bb</text>

  <!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
       DECORATIVE LABEL TAGS
  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->
  <!-- Student boundary label -->
  <rect x="190" y="108" width="160" height="20" rx="4" fill="#dbeafe"/>
  <text x="270" y="122" font-size="11" fill="#1d4ed8" text-anchor="middle" font-weight="600">\ud83c\udf93 Student Use Cases</text>

  <!-- Admin boundary label -->
  <rect x="520" y="108" width="160" height="20" rx="4" fill="#fef9c3"/>
  <text x="600" y="122" font-size="11" fill="#92400e" text-anchor="middle" font-weight="600">\ud83d\udee0 Admin Use Cases</text>

</svg>
</div>
